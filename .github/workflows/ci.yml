name: CI & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  release:
    name: Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build universal release binary
        run: swift build -c release --product LittleTidy --arch arm64 --arch x86_64

      - name: Assemble .app bundle
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          BIN="$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)/LittleTidy"
          APP="dist/LittleTidy.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS"
          cp "$BIN" "$APP/Contents/MacOS/LittleTidy"
          chmod +x "$APP/Contents/MacOS/LittleTidy"
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>LittleTidy</string>
            <key>CFBundleIdentifier</key><string>com.federicotrevisani.LittleTidy</string>
            <key>CFBundleName</key><string>LittleTidy</string>
            <key>CFBundleDisplayName</key><string>LittleTidy</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleVersion</key><string>${{ github.run_number }}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
            <key>LSApplicationCategoryType</key><string>public.app-category.utilities</string>
            <key>NSPrincipalClass</key><string>NSApplication</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

      # Ad-hoc signing lets the app run on Apple Silicon. It is NOT notarized;
      # see the notarization section in CONTRIBUTING/README for the signed flow.
      - name: Ad-hoc sign
        run: codesign --force --deep --sign - dist/LittleTidy.app

      - name: Package zip
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "LittleTidy.app" "LittleTidy-${VERSION}-macos.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$GITHUB_REF_NAME" "dist/LittleTidy-${VERSION}-macos.zip" \
            --title "LittleTidy ${VERSION}" \
            --generate-notes \
            --notes "Universal build (Apple Silicon + Intel), macOS 14+. The app is ad-hoc signed but **not notarized**: on first launch, right-click → Open, or run \`xattr -dr com.apple.quarantine /Applications/LittleTidy.app\`. Everything is moved to Trash only and reversible."
