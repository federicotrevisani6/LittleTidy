name: CI & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  # Surfaces whether Developer ID signing secrets are configured so the release
  # job can be gated on them. Secrets are not allowed in job-level `if:`, so we
  # expose the result as a job output.
  signing-check:
    name: Check signing secrets
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.detect.outputs.enabled }}
    steps:
      - id: detect
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
        run: |
          if [ -n "$CERT_P12" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Release
    needs: [test, signing-check]
    # Only publish from CI when it can produce a notarized build. Without signing
    # secrets the release is done locally (notarized), so CI must not also create
    # a second, ad-hoc release for the same tag.
    if: startsWith(github.ref, 'refs/tags/v') && needs.signing-check.outputs.enabled == 'true'
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build universal release binary
        run: swift build -c release --product LittleTidy --arch arm64 --arch x86_64

      - name: Assemble .app bundle
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          BIN="$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)/LittleTidy"
          APP="dist/LittleTidy.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS"
          cp "$BIN" "$APP/Contents/MacOS/LittleTidy"
          chmod +x "$APP/Contents/MacOS/LittleTidy"
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>LittleTidy</string>
            <key>CFBundleIdentifier</key><string>com.federicotrevisani.LittleTidy</string>
            <key>CFBundleName</key><string>LittleTidy</string>
            <key>CFBundleDisplayName</key><string>LittleTidy</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleVersion</key><string>${{ github.run_number }}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
            <key>LSApplicationCategoryType</key><string>public.app-category.utilities</string>
            <key>NSPrincipalClass</key><string>NSApplication</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

      # Developer ID signing + notarization runs when the signing secrets are
      # present; otherwise it falls back to ad-hoc signing so the workflow still
      # produces a runnable (un-notarized) build.
      - name: Detect signing secrets
        id: signing
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
        run: |
          if [ -n "$CERT_P12" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Developer ID certificate
        if: steps.signing.outputs.enabled == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          p12-password: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}

      - name: Sign, notarize, and staple
        if: steps.signing.outputs.enabled == 'true'
        env:
          API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          APP="dist/LittleTidy.app"
          printf '%s' "$API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          codesign --force --deep --options runtime --timestamp \
            --sign "Developer ID Application" "$APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$RUNNER_TEMP/AuthKey.p8" --key-id "$API_KEY_ID" --issuer "$API_ISSUER_ID" --wait
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"
          rm -f "$RUNNER_TEMP/AuthKey.p8"

      - name: Ad-hoc sign (fallback when no Developer ID secrets)
        if: steps.signing.outputs.enabled != 'true'
        run: codesign --force --deep --sign - dist/LittleTidy.app

      - name: Package zip
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "LittleTidy.app" "LittleTidy-${VERSION}-macos.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          SIGNED: ${{ steps.signing.outputs.enabled }}
        run: |
          if [ "$SIGNED" = "true" ]; then
            NOTE="Universal build (Apple Silicon + Intel), requires macOS 14+. Signed with Developer ID and notarized by Apple — opens with a normal double-click. Everything is moved to the Trash only and reversible; system areas are excluded by default and deep uninstall is opt-in."
          else
            NOTE="Universal build (Apple Silicon + Intel), requires macOS 14+. Ad-hoc signed but not notarized: on first launch, right-click → Open, or run \`xattr -dr com.apple.quarantine /Applications/LittleTidy.app\`. Everything is moved to the Trash only and reversible."
          fi
          gh release create "$GITHUB_REF_NAME" "dist/LittleTidy-${VERSION}-macos.zip" \
            --title "LittleTidy ${VERSION}" \
            --generate-notes \
            --notes "$NOTE"
