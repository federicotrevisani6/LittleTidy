name: MacCleaner
options:
  minimumXcodeGenVersion: 2.41.0
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
targets:
  MacCleanerCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/MacCleanerCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.federicotrevisani.MacCleanerCore
        GENERATE_INFOPLIST_FILE: YES
  MacCleaner:
    type: application
    platform: macOS
    sources:
      - path: Sources/MacCleaner
    dependencies:
      - target: MacCleanerCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.federicotrevisani.MacCleaner
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: MacCleaner
        INFOPLIST_KEY_CFBundleName: MacCleaner
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
  MacCleanerQA:
    type: tool
    platform: macOS
    sources:
      - path: Sources/MacCleanerQA
    dependencies:
      - target: MacCleanerCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.federicotrevisani.MacCleanerQA
  MacCleanerCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/MacCleanerCoreTests
    dependencies:
      - target: MacCleanerCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.federicotrevisani.MacCleanerCoreTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  MacCleaner:
    build:
      targets:
        MacCleaner: all
        MacCleanerQA: all
        MacCleanerCoreTests: [test]
    run:
      config: Debug
      executable: MacCleaner
    test:
      config: Debug
      targets:
        - MacCleanerCoreTests
