name: LittleTidy
options:
  minimumXcodeGenVersion: 2.41.0
  deploymentTarget:
    macOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 3VU7K9SUV8
    ENABLE_HARDENED_RUNTIME: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "2"
targets:
  LittleTidyCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/LittleTidyCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.federicotrevisani.LittleTidyCore
        GENERATE_INFOPLIST_FILE: YES
  LittleTidy:
    type: application
    platform: macOS
    sources:
      - path: Sources/LittleTidy
    dependencies:
      - target: LittleTidyCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.federicotrevisani.LittleTidy
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: LittleTidy
        INFOPLIST_KEY_CFBundleName: LittleTidy
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_LSMinimumSystemVersion: "26.0"
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
  LittleTidyQA:
    type: tool
    platform: macOS
    sources:
      - path: Sources/LittleTidyQA
    dependencies:
      - target: LittleTidyCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.federicotrevisani.LittleTidyQA
  LittleTidyCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/LittleTidyCoreTests
    dependencies:
      - target: LittleTidyCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.federicotrevisani.LittleTidyCoreTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  LittleTidy:
    build:
      targets:
        LittleTidy: all
        LittleTidyQA: all
        LittleTidyCoreTests: [test]
    run:
      config: Debug
      executable: LittleTidy
    test:
      config: Debug
      targets:
        - LittleTidyCoreTests
